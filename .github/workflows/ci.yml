name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff check
        run: pip install ruff && ruff check src/ pages/

      - name: Mypy
        run: pip install mypy && mypy src/ --ignore-missing-imports

      - name: Pytest
        run: pip install pytest && pytest tests/ -v
